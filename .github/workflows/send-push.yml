# Lege diese Datei ab unter: .github/workflows/send-push.yml
name: Push-Benachrichtigung senden

on:
  # Manuell über die GitHub-Oberfläche auslösen (mit Eingabefeldern)
  workflow_dispatch:
    inputs:
      title:
        description: "Titel der Nachricht"
        required: false
        default: "Wetter weltweit"
      body:
        description: "Nachrichtentext"
        required: false
        default: "Es gibt neue Wetterinfos für dich!"
      url:
        description: "Ziel-URL beim Klick"
        required: false
        default: "/"

  # Optional: automatisch nach Zeitplan (Beispiel: täglich 6:00 UTC)
  # schedule:
  #   - cron: "0 6 * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhängigkeiten installieren
        run: npm install firebase-admin

      - name: Push senden
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUSH_TITLE: ${{ github.event.inputs.title }}
          PUSH_BODY: ${{ github.event.inputs.body }}
          PUSH_URL: ${{ github.event.inputs.url }}
        run: node send-push.mjs
