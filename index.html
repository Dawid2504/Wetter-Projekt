<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weltzeituhr - Suche</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>🌍 Weltzeituhr</h1>
      <p>Finde jede offizielle IANA-Zeitzone der Welt</p>
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Suche (z.B. Berlin, Tokyo, Pacific)..." autocomplete="off">
        <button id="clear-btn" class="clear-btn" aria-label="Suche löschen">✕</button>
      </div>
      <button id="show-all-btn" class="show-all-btn">Alle Zeitzonen anzeigen</button>
    </header>
    
    <div id="status-message" class="status">Tippe etwas ein oder klicke auf "Alle anzeigen".</div>
    <div id="clocks-container" class="clocks-grid"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
